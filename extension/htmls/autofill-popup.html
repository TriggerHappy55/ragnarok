<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 0;
      margin: 0;
    }
    .container {
      padding: 20px;
      background-color: white;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    .credentials-info {
      background-color: #f5f5f5;
      padding: 12px;
      border-radius: 3px;
      margin: 12px 0;
      font-size: 14px;
    }
    .credentials-info strong {
      display: block;
      margin-bottom: 4px;
      color: #555;
    }
    .credentials-value {
      word-break: break-all;
      color: #333;
      margin-left: 8px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
    }
    .confirm-btn {
      background-color: #4CAF50;
      color: white;
    }
    .confirm-btn:hover {
      background-color: #45a049;
    }
    .cancel-btn {
      background-color: #757575;
      color: white;
    }
    .cancel-btn:hover {
      background-color: #616161;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>¿Usar credenciales guardadas?</h3>
    <p>Se encontraron credenciales para este sitio. ¿Deseas completar el formulario?</p>
    
    <div class="credentials-info">
      <strong>Email/Usuario:</strong>
      <div class="credentials-value" id="emailDisplay"></div>
    </div>
    
    <div class="credentials-info">
      <strong>Contraseña:</strong>
      <div class="credentials-value">••••••••</div>
    </div>
    
    <div class="buttons">
      <button class="cancel-btn" id="cancelBtn">No</button>
      <button class="confirm-btn" id="confirmBtn">Sí, rellenar</button>
    </div>
  </div>

  <script src="./autofill-popup.js"></script>
</body>
</html>
