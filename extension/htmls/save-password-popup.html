<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 0;
      margin: 0;
    }
    .container {
      padding: 20px;
      background-color: white;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    .password-info {
      background-color: #f5f5f5;
      padding: 10px;
      border-radius: 3px;
      margin: 10px 0;
      font-size: 14px;
    }
    .warning {
      background-color: #ffebee;
      border-left: 4px solid #f44336;
      padding: 10px;
      margin: 10px 0;
      border-radius: 3px;
      color: #d32f2f;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
    }
    .save-btn {
      background-color: #4CAF50;
      color: white;
    }
    .save-btn:hover {
      background-color: #45a049;
    }
    .cancel-btn {
      background-color: #757575;
      color: white;
    }
    .cancel-btn:hover {
      background-color: #616161;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Guardar Contraseña</h3>
    <p>¿Quieres guardar esta contraseña?</p>
    
    <div class="password-info">
      <strong>Sitio:</strong> <span id="siteUrl"></span><br>
      <strong>Email:</strong> <span id="emailText"></span>
    </div>
    
    <div id="breachWarning" class="warning" style="display: none;">
      ⚠️ Esta contraseña ha sido vulnerada. Se recomienda cambiarla.
    </div>
    
    <div class="buttons">
      <button class="cancel-btn" id="cancelBtn">No guardar</button>
      <button class="save-btn" id="saveBtn">Guardar</button>
    </div>
  </div>

  <script src="./save-password-popup.js"></script>
</body>
</html>
