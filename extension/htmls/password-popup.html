<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 0;
      margin: 0;
    }
    .container {
      padding: 20px;
      background-color: white;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    p {
      margin: 10px 0;
      color: #666;
      font-size: 14px;
    }
    .info-box {
      background-color: #f5f5f5;
      padding: 12px;
      border-radius: 3px;
      margin: 12px 0;
      font-size: 14px;
    }
    .info-box strong {
      display: block;
      margin-bottom: 4px;
      color: #555;
    }
    .info-value {
      word-break: break-all;
      color: #333;
      margin-left: 8px;
    }
    .warning {
      background-color: #ffebee;
      border-left: 4px solid #f44336;
      padding: 10px;
      margin: 10px 0;
      border-radius: 3px;
      color: #d32f2f;
      font-size: 13px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .confirm-btn {
      background-color: #4CAF50;
      color: white;
    }
    .confirm-btn:hover {
      background-color: #45a049;
    }
    .cancel-btn {
      background-color: #757575;
      color: white;
    }
    .cancel-btn:hover {
      background-color: #616161;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Save Password Mode -->
    <div id="saveModeContainer" style="display: none;">
      <h3>Guardar Contraseña</h3>
      <p>¿Quieres guardar esta contraseña?</p>
      
      <div class="info-box">
        <strong>Sitio:</strong>
        <div class="info-value" id="siteUrl"></div>
      </div>
      
      <div class="info-box">
        <strong>Email:</strong>
        <div class="info-value" id="emailText"></div>
      </div>
      
      <div id="breachWarning" class="warning" style="display: none;">
        ⚠️ Esta contraseña ha sido vulnerada. Se recomienda cambiarla.
      </div>
      
      <div class="buttons">
        <button class="cancel-btn" id="saveCancelBtn">No guardar</button>
        <button class="confirm-btn" id="saveSaveBtn">Guardar</button>
      </div>
    </div>

    <!-- Autofill Mode -->
    <div id="autofillModeContainer" style="display: none;">
      <h3>¿Usar credenciales guardadas?</h3>
      <p>Se encontraron credenciales para este sitio. ¿Deseas completar el formulario?</p>
      
      <div class="info-box">
        <strong>Email/Usuario:</strong>
        <div class="info-value" id="autofillEmailDisplay"></div>
      </div>
      
      <div class="info-box">
        <strong>Contraseña:</strong>
        <div class="info-value">••••••••</div>
      </div>
      
      <div class="buttons">
        <button class="cancel-btn" id="autofillCancelBtn">No</button>
        <button class="confirm-btn" id="autofillConfirmBtn">Sí, rellenar</button>
      </div>
    </div>
  </div>

  <script src="./password-popup.js"></script>
</body>
</html>
