<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<style>
		body {
		  font-family: Arial, sans-serif;
		  width: 250px;
		  text-align: center;
		  padding: 20px;
		  display: flex;
		  flex-direction: column;
		  align-items: center;
		  justify-content: flex-start
		}
		.container {
			border: 1px solid #ddd;
			padding: 20px;
			border-radius: 5px;
			width: 100%;
		}
		.field {
			margin: 15px 0;
			text-align: left;
		}
		label {
			font-weight: bold;
			display: block;
			margin-bottom: 5px;
		}
		.field-value {
			background-color: #f5f5f5;
			padding: 10px;
			border: 1px solid #ddd;
			border-radius: 3px;
			word-break: break-all;
		}
		.checkbox-field {
			margin: 10px 0;
		}
		.buttons {
			margin-top: 20px;
			display: flex;
			gap: 10px;
		}
		button {
			flex: 1;
			padding: 10px;
			border: none;
			border-radius: 3px;
			cursor: pointer;
			font-size: 14px;
		}
		.back-btn {
			background-color: #757575;
			color: white;
		}
		.back-btn:hover {
			background-color: #616161;
		}
		.delete-btn {
			background-color: #f44336;
			color: white;
		}
		.delete-btn:hover {
			background-color: #da190b;
		}
		.modal {
			display: none;
			position: fixed;
			z-index: 1000;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0.4);
		}
		.modal.show {
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.modal-content {
			background-color: white;
			padding: 20px;
			border: 1px solid #888;
			border-radius: 5px;
			width: 90%;
			max-width: 300px;
			text-align: center;
		}
		.modal-content h3 {
			margin-top: 0;
		}
		.modal-buttons {
			display: flex;
			gap: 10px;
			margin-top: 20px;
		}
		.modal-buttons button {
			flex: 1;
		}
		.confirm-btn {
			background-color: #f44336;
			color: white;
		}
		.confirm-btn:hover {
			background-color: #da190b;
		}
		.cancel-btn {
			background-color: #757575;
			color: white;
		}
		.cancel-btn:hover {
			background-color: #616161;
		}
		#back-link {
			margin-top: 15px;
			text-align: center;
		}
		#back-link a {
			color: #4CAF50;
			text-decoration: none;
			cursor: pointer;
		}
		#back-link a:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>
	<div class="container">
		<h2>Password Details</h2>
		
		<div class="field">
			<label>URL:</label>
			<div class="field-value" id="view-url"></div>
		</div>

		<div class="field">
			<label>Email:</label>
			<div class="field-value" id="view-email"></div>
		</div>

		<div class="field">
			<label>Password:</label>
			<div class="field-value" id="view-password"></div>
		</div>

		<div class="field">
			<label>Comment:</label>
			<div class="field-value" id="view-comentario"></div>
		</div>

		<div class="field checkbox-field">
			<input type="checkbox" id="view-autologin" disabled />
			<label for="view-autologin" style="display: inline; font-weight: normal;">Auto-login</label>
		</div>

		<div class="buttons">
			<button class="back-btn" id="backBtn">← Volver</button>
			<button class="delete-btn" id="deleteBtn">Eliminar</button>
		</div>
	</div>

	<!-- Modal de confirmación -->
	<div id="confirmModal" class="modal">
		<div class="modal-content">
			<h3>¿Estás seguro?</h3>
			<p>Esta acción no se puede deshacer.</p>
			<div class="modal-buttons">
				<button class="cancel-btn" id="cancelBtn">Cancelar</button>
				<button class="confirm-btn" id="confirmDeleteBtn">Eliminar</button>
			</div>
		</div>
	</div>

	<script type="module" src="./view-password.js"></script>
</body>
</html>
