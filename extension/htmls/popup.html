<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 250px;
      text-align: center;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start
    }
    .container {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 5px;
      width: 100%;
    }
    h2 {
      margin-top: 0;
    }
    #app {
      min-height: 100px;
    }
    .card {
      background-color: #f5f5f5;
      padding: 10px;
      margin: 8px 0;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid #ddd;
    }
    .card:hover {
      background-color: #eeeeee;
    }
    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
    }
    .new-btn {
      background-color: #4CAF50;
      color: white;
    }
    .new-btn:hover {
      background-color: #45a049;
    }
    .generate-btn {
      background-color: #2196F3;
      color: white;
    }
    .generate-btn:hover {
      background-color: #0b7dda;
    }
    .logout-btn {
      background-color: #f44336;
      color: white;
      margin-top: 15px;
    }
    .logout-btn:hover {
      background-color: #da190b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Contraseñas</h2>
    <div id="app"></div>
    
    <div class="buttons">
      <button class="new-btn" id="newBtn">+ Nueva</button>
      <button class="generate-btn" id="generateBtn">Generar</button>
    </div>
    
    <button class="logout-btn" id="logout-btn">Logout</button>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
