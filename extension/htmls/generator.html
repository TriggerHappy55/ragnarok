<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 250px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .generator-container {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 5px;
      width: 100%;
    }
    h2 {
      margin-top: 0;
    }
    .form-group {
      margin: 15px 0;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 14px;
    }
    input[type="number"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 3px;
      box-sizing: border-box;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      margin: 10px 0;
    }
    input[type="checkbox"] {
      margin-right: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #45a049;
    }
    button:disabled {
      background-color: #cccccc;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background-color: #f5f5f5;
      border-radius: 3px;
      display: none;
    }
    .result.show {
      display: block;
    }
    .password-display {
      background-color: white;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 3px;
      word-break: break-all;
      margin-bottom: 10px;
      font-family: monospace;
    }
    .copy-btn {
      width: 100%;
      padding: 8px;
      background-color: #2196F3;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .copy-btn:hover {
      background-color: #0b7dda;
    }
    .error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
    #back-link {
      margin-top: 15px;
      text-align: center;
    }
    #back-link a {
      color: #4CAF50;
      text-decoration: none;
      cursor: pointer;
    }
    #back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="generator-container">
    <h2>Password Generator</h2>
    
    <div class="form-group">
      <label for="longitud">Longitud:</label>
      <input type="number" id="longitud" value="12" min="4" max="128" />
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="mayusculas" checked />
      <label for="mayusculas">Mayúsculas (A-Z)</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="minusculas" checked />
      <label for="minusculas">Minúsculas (a-z)</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="digitos" checked />
      <label for="digitos">Dígitos (0-9)</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="simbolos" />
      <label for="simbolos">Símbolos (!@#$%)</label>
    </div>

    <button id="generateBtn">Generar Contraseña</button>
    <div id="error" class="error"></div>

    <div id="result" class="result">
      <div id="passwordDisplay" class="password-display"></div>
      <button class="copy-btn" id="copyBtn">Copiar al Portapapeles</button>
    </div>

    <div class="buttons">
      <button class="back-btn" id="backBtn">← Volver</button>
    </div>
  </div>

  <script type="module" src="./generator.js"></script>
</body>
</html>
